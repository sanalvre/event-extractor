name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest

      - name: Block committed local-only files
        run: |
          if git ls-files | grep -qx '\.env'; then echo 'Do not commit .env'; exit 1; fi
          if git ls-files | grep -q '^\.ete_pilot/'; then echo 'Do not commit .ete_pilot artifacts'; exit 1; fi
          if git ls-files | grep -q '^\.claude/'; then echo 'Do not commit .claude workspace files'; exit 1; fi
